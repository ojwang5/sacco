{% extends 'sacco/base.html' %}

{% block title %}Login - SACCO Management System{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 80px);">
    <div class="card card-modern p-4" style="max-width: 420px; width: 100%;">
        <div class="text-center mb-4">
            <h3 class="fw-bold">Welcome to SACCO</h3>
            <p class="text-muted">Sign in to access your account</p>
        </div>
        <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label for="identifier" class="form-label">Phone Number</label>
                <input type="text" class="form-control form-control-lg" id="identifier" name="identifier" required autocomplete="username">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control form-control-lg" id="password" name="password" required autocomplete="current-password">
            </div>
            <div class="mb-3 text-end">
                <a href="{% url 'sacco:forgot_password' %}" class="text-decoration-none">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">Login</button>
        </form>
        <p class="text-muted text-center mt-3">Don’t have an account? Contact admin to register.</p>
    </div>
</div>
{% endblock %}
