{% extends "admin/base_site.html" %}
{% block extrahead %}
    {{ block.super }}
    <link rel="stylesheet" href="/static/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/admin_custom.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Updated admin header to match the screenshot */
        body {
            background-color: #f8f9fa;
            color: #212529;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }
        .header {
            background-color: #3a6ea5;
            color: #d4af37;
            padding: 10px 20px;
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header .left {
            font-size: 1.4rem;
            font-weight: 700;
        }
        .header .right a {
            color: #d4af37;
            margin-left: 15px;
            text-decoration: none;
            font-weight: 600;
        }
        .header .right a:hover {
            text-decoration: underline;
        }
        .header .right span {
            margin-right: 10px;
            font-weight: 400;
            text-transform: uppercase;
        }
        /* Site admin section headers */
        .module h2 {
            background-color: #3a6ea5;
            color: white;
            padding: 8px 15px;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-bottom: 0;
        }
        /* Recent actions box */
        #recent-actions {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 4px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        /* Links styling */
        a {
            color: #3a6ea5;
        }
        a:hover {
            color: #d4af37;
            text-decoration: underline;
        }
    </style>
{% endblock %}

{% block content %}
    <header class="admin-header">
        <div class="left">SACCO administration</div>
        <div class="right">
            <span>WELCOME, {{ user.get_username|upper }}</span>
            <a href="/">VIEW SITE</a> /
            <a href="{% url 'admin:password_change' %}">CHANGE PASSWORD</a> /
            <a href="{% url 'admin:logout' %}">LOG OUT</a>
            <span class="theme-toggle-icon" onclick="toggleTheme()">&#9728;</span>
        </div>
    </header>
    <div class="container mt-4">
        {{ block.super }}
    </div>
{% endblock %}
