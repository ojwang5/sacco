{% extends "admin/base.html" %}
{% block content %}
<div class="container py-5" style="background: linear-gradient(135deg, #f8ffae 0%, #43c6ac 100%); min-height: 100vh;">
    <div class="row justify-content-center">
        <div class="col-md-12">
            <div class="card shadow-lg border-0" style="background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); border-radius: 20px;">
                <div class="card-header text-white" style="background: linear-gradient(90deg, #28a745 0%, #43c6ac 100%); border-radius: 20px 20px 0 0 !important;">
                    <h4 class="mb-0 fw-bold">{{ title }}</h4>
                </div>
                <div class="card-body p-4">
                    {{ block.super }}
                </div>
            </div>
        </div>
    </div>
</div>
<style>
/* Enhanced table styling */
#result_list {
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

#result_list thead th {
    background: linear-gradient(90deg, #1273ea 0%, #28a745 100%);
    color: white;
    font-weight: 600;
    border: none;
    padding: 15px;
    text-transform: uppercase;
    font-size: 0.9rem;
    letter-spacing: 0.5px;
}

#result_list tbody tr {
    background: white;
    transition: all 0.3s ease;
    border-bottom: 1px solid #e9ecef;
}

#result_list tbody tr:hover {
    background: #f8f9fa;
    transform: translateY(-2px);
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

#result_list tbody td {
    padding: 15px;
    vertical-align: middle;
    border: none;
}

#result_list tbody td a {
    color: #1273ea;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.3s ease;
}

#result_list tbody td a:hover {
    color: #28a745;
    text-decoration: underline;
}

/* Pagination styling */
.paginator {
    margin-top: 30px;
    text-align: center;
}

.paginator .this-page {
    background: linear-gradient(90deg, #28a745 0%, #43c6ac 100%);
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    font-weight: 600;
}

.paginator a {
    color: #1273ea;
    text-decoration: none;
    padding: 10px 15px;
    border-radius: 8px;
    transition: all 0.3s ease;
    margin: 0 5px;
}

.paginator a:hover {
    background: #1273ea;
    color: white;
    text-decoration: none;
}

/* Action buttons */
.object-tools a {
    background: linear-gradient(90deg, #28a745 0%, #43c6ac 100%);
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    transition: all 0.3s ease;
    margin-right: 10px;
}

.object-tools a:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
    color: white;
    text-decoration: none;
}

/* Filter and search styling */
#changelist-filter {
    background: white;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    margin-bottom: 20px;
}

#changelist-search {
    background: white;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    margin-bottom: 20px;
}

#changelist-search input[type="text"] {
    border-radius: 8px;
    border: 2px solid #e9ecef;
    padding: 10px 15px;
    transition: border-color 0.3s ease;
}

#changelist-search input[type="text"]:focus {
    border-color: #28a745;
    box-shadow: 0 0 10px rgba(40, 167, 69, 0.2);
}

#changelist-search button {
    background: linear-gradient(90deg, #28a745 0%, #43c6ac 100%);
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    color: white;
    font-weight: 600;
    transition: all 0.3s ease;
}

#changelist-search button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
}
</style>
{% endblock %}
